<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBFILMS24 - TV Series Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0f; color:#fff; font-family:'Inter',sans-serif; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .back-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; margin-bottom:20px; }
        .series-hero { display:flex; gap:30px; background:rgba(20,20,30,0.7); border-radius:28px; padding:25px; margin-bottom:30px; flex-wrap:wrap; }
        .poster img { width:200px; border-radius:16px; }
        .title { font-size:32px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .season-selector, .servers { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; }
        .season-btn, .server-btn { background:#1e2026; border:none; padding:8px 20px; border-radius:40px; color:#ccc; cursor:pointer; }
        .season-btn.active, .server-btn.active, .season-btn:hover, .server-btn:hover { background:#e50914; color:white; }
        .episodes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin:20px 0; }
        .episode-card { background:#1a1c24; border-radius:16px; padding:12px; display:flex; justify-content:space-between; cursor:pointer; }
        .episode-card:hover { background:#e50914; }
        .player-wrapper { border-radius:24px; overflow:hidden; background:#000; margin-top:20px; }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="info" class="series-hero"></div>
    <div id="seasonsContainer" class="season-selector"></div>
    <div class="servers" id="serverList"></div>
    <div id="episodesContainer" class="episodes-grid"></div>
    <div id="playerContainer" class="player-wrapper" style="display:none;"><iframe id="player" allowfullscreen></iframe></div>
</div>
<script>
    const tvId = new URLSearchParams(location.search).get('id');
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let currentSeason = 1, currentServer = 'vidsrc';
    const servers = {
        vidsrc: { name: 'Server 1', getUrl: (s,e) => `https://vidsrcme.ru/embed/tv/${tvId}/${s}/${e}` },
        multiembed: { name: 'Server 2', getUrl: (s,e) => `https://multiembed.mov/?video_id=${tvId}&tmdb=1&tv=1&season=${s}&episode=${e}` },
        embed2: { name: 'Server 3', getUrl: (s,e) => `https://www.2embed.cc/embedtv/${tvId}&season=${s}&episode=${e}` }
    };
    async function loadTV() {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}`);
        const data = await res.json();
        document.getElementById('info').innerHTML = `<div class="poster"><img src="${IMG+data.poster_path}"></div><div><div class="title">${data.name}</div><p>${data.overview}</p><p>⭐ ${data.vote_average}</p></div>`;
        const seasons = data.seasons.filter(s=>s.season_number>0);
        const seasonsDiv = document.getElementById('seasonsContainer');
        seasons.forEach(s=>{ const btn=document.createElement('button'); btn.textContent=`Season ${s.season_number}`; btn.className='season-btn'; btn.onclick=()=>{ currentSeason=s.season_number; document.querySelectorAll('.season-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadEpisodes(currentSeason); }; seasonsDiv.appendChild(btn); });
        if(seasons.length) loadEpisodes(seasons[0].season_number);
        const serverDiv = document.getElementById('serverList');
        Object.keys(servers).forEach(key=>{ const btn=document.createElement('button'); btn.textContent=servers[key].name; btn.className='server-btn'; btn.onclick=()=>{ currentServer=key; document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }; serverDiv.appendChild(btn); });
    }
    async function loadEpisodes(season) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${season}?api_key=${API_KEY}`);
        const data = await res.json();
        const cont = document.getElementById('episodesContainer');
        cont.innerHTML = '';
        data.episodes.forEach(ep=>{
            const card = document.createElement('div');
            card.className = 'episode-card';
            card.innerHTML = `<span>E${ep.episode_number}</span><span>${ep.name}</span><i class="fas fa-play"></i>`;
            card.onclick = () => { document.getElementById('player').src = servers[currentServer].getUrl(season, ep.episode_number); document.getElementById('playerContainer').style.display='block'; };
            cont.appendChild(card);
        });
    }
    loadTV();
</script>
</body>
</html>
