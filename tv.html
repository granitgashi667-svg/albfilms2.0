<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBFILMS24 - TV Series Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.75);
            z-index:-1;
        }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .back-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; margin-bottom:20px; display:inline-flex; gap:8px; }
        .series-hero { display:flex; gap:30px; background:rgba(20,20,30,0.7); backdrop-filter:blur(12px); border-radius:28px; padding:25px; margin-bottom:30px; flex-wrap:wrap; }
        .poster img { width:220px; border-radius:16px; }
        .title { font-size:36px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .detail-badge { background:#1e2026; padding:5px 12px; border-radius:30px; font-size:0.85rem; display:inline-block; margin-right:10px; margin-top:8px; }
        .season-selector, .servers { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; }
        .season-btn, .server-btn { background:#1e2026; border:none; padding:8px 20px; border-radius:40px; color:#ccc; cursor:pointer; }
        .season-btn.active, .server-btn.active, .season-btn:hover, .server-btn:hover { background:#e50914; color:white; }
        .episodes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin:20px 0; }
        .episode-card { background:#1a1c24; border-radius:16px; padding:12px; display:flex; justify-content:space-between; cursor:pointer; transition:0.2s; }
        .episode-card:hover { background:#e50914; }
        .player-wrapper { border-radius:24px; overflow:hidden; background:#000; margin-top:20px; }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
        @media (max-width:700px){ .poster img{ width:140px; } .title{ font-size:24px; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="info" class="series-hero"></div>
    <div id="seasonsContainer" class="season-selector"></div>
    <div class="servers" id="serverList"></div>
    <div id="episodesContainer" class="episodes-grid"></div>
    <div id="playerContainer" class="player-wrapper" style="display:none;"><iframe id="player" allowfullscreen></iframe></div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tvId = urlParams.get('id');
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';
    let currentSeason = 1;
    let currentServer = 'vidsrc';
    
    const servers = {
        vidsrc: { name: 'Server 1', getUrl: (s,e) => `https://vidsrcme.ru/embed/tv/${tvId}/${s}/${e}` },
        multiembed: { name: 'Server 2', getUrl: (s,e) => `https://multiembed.mov/?video_id=${tvId}&tmdb=1&tv=1&season=${s}&episode=${e}` },
        embed2: { name: 'Server 3', getUrl: (s,e) => `https://www.2embed.cc/embedtv/${tvId}&season=${s}&episode=${e}` },
        superembed: { name: 'Server 4', getUrl: (s,e) => `https://superembed.stream/tv/${tvId}/${s}/${e}` },
        vidcloud: { name: 'Server 5', getUrl: (s,e) => `https://vidcloud9.com/embed/tv/${tvId}/${s}/${e}` },
        streamtape: { name: 'Server 6', getUrl: (s,e) => `https://streamtape.com/e/${tvId}/${s}/${e}` }
    };
    
    async function loadTV() {
        if (!tvId) {
            document.getElementById('info').innerHTML = '<div>No TV series ID provided.</div>';
            return;
        }
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&append_to_response=credits`);
            const data = await res.json();
            if (data.backdrop_path) document.body.style.backgroundImage = `url('${BACKDROP + data.backdrop_path}')`;
            else if (data.poster_path) document.body.style.backgroundImage = `url('${IMG + data.poster_path}')`;
            
            const year = (data.first_air_date || '').split('-')[0] || 'N/A';
            const seasonsCount = data.number_of_seasons;
            const cast = data.credits?.cast?.slice(0,5).map(c=>c.name).join(', ') || 'N/A';
            const studio = data.production_companies?.[0]?.name || 'Unknown';
            
            document.getElementById('info').innerHTML = `
                <div class="poster"><img src="${data.poster_path ? IMG+data.poster_path : ''}" alt="${data.name}"></div>
                <div style="flex:1">
                    <div class="title">${data.name}</div>
                    <div>
                        <span class="detail-badge"><i class="fas fa-calendar"></i> ${year}</span>
                        <span class="detail-badge"><i class="fas fa-star"></i> ${data.vote_average?.toFixed(1)}/10</span>
                        <span class="detail-badge"><i class="fas fa-tv"></i> ${seasonsCount} Seasons</span>
                        <span class="detail-badge"><i class="fas fa-building"></i> ${studio}</span>
                    </div>
                    <div class="cast" style="margin:12px 0;"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div>
                    <p>${data.overview || 'No description.'}</p>
                </div>
            `;
            
            const seasons = data.seasons.filter(s => s.season_number > 0);
            const seasonsDiv = document.getElementById('seasonsContainer');
            seasonsDiv.innerHTML = '';
            if (seasons.length === 0) {
                seasonsDiv.innerHTML = '<div>No seasons found.</div>';
            } else {
                seasons.forEach(s => {
                    const btn = document.createElement('button');
                    btn.textContent = `Season ${s.season_number}`;
                    btn.className = 'season-btn';
                    if (currentSeason === s.season_number) btn.classList.add('active');
                    btn.onclick = () => {
                        currentSeason = s.season_number;
                        document.querySelectorAll('.season-btn').forEach(b=>b.classList.remove('active'));
                        btn.classList.add('active');
                        loadEpisodes(currentSeason);
                    };
                    seasonsDiv.appendChild(btn);
                });
                currentSeason = seasons[0].season_number;
                document.querySelectorAll('.season-btn')[0]?.classList.add('active');
                loadEpisodes(currentSeason);
            }
            
            const serverDiv = document.getElementById('serverList');
            serverDiv.innerHTML = '';
            Object.keys(servers).forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = servers[key].name;
                btn.className = `server-btn ${key === currentServer ? 'active' : ''}`;
                btn.onclick = () => {
                    currentServer = key;
                    document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    const activeEp = document.querySelector('.episode-card.active-ep');
                    if (activeEp && activeEp.dataset.season && activeEp.dataset.episode) {
                        playEpisode(parseInt(activeEp.dataset.season), parseInt(activeEp.dataset.episode));
                    }
                };
                serverDiv.appendChild(btn);
            });
        } catch(e) {
            console.error(e);
            document.getElementById('info').innerHTML = '<div>Error loading series details.</div>';
        }
    }
    
    async function loadEpisodes(season) {
        const cont = document.getElementById('episodesContainer');
        cont.innerHTML = '<div>Loading episodes...</div>';
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${season}?api_key=${API_KEY}`);
            const data = await res.json();
            cont.innerHTML = '';
            if (!data.episodes || data.episodes.length === 0) {
                cont.innerHTML = '<div>No episodes found.</div>';
                return;
            }
            data.episodes.forEach(ep => {
                const card = document.createElement('div');
                card.className = 'episode-card';
                card.dataset.season = season;
                card.dataset.episode = ep.episode_number;
                card.innerHTML = `<span>E${ep.episode_number}</span><span>${ep.name}</span><i class="fas fa-play"></i>`;
                card.onclick = () => {
                    document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active-ep'));
                    card.classList.add('active-ep');
                    playEpisode(season, ep.episode_number);
                };
                cont.appendChild(card);
            });
        } catch(e) {
            console.error(e);
            cont.innerHTML = '<div>Error loading episodes.</div>';
        }
    }
    
    function playEpisode(season, episode) {
        const playerContainer = document.getElementById('playerContainer');
        const player = document.getElementById('player');
        const embedUrl = servers[currentServer].getUrl(season, episode);
        player.src = embedUrl;
        playerContainer.style.display = 'block';
        playerContainer.scrollIntoView({ behavior: 'smooth' });
    }
    
    loadTV();
</script>
</body>
</html>
