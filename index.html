<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ALBFILMS24 – Movies & Series</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <h2>ALBFILMS<span>24</span></h2>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link active"><i class="fas fa-film"></i> Movies</a>
        <a href="tv.html" class="nav-link"><i class="fas fa-tv"></i> TV Shows</a>
      </nav>
      <div class="user-lists">
        <h4><i class="fas fa-heart"></i> My Lists</h4>
        <a href="#" class="list-link" data-list="favorites"><i class="fas fa-heart"></i> Favorites</a>
        <a href="#" class="list-link" data-list="watchlater"><i class="fas fa-clock"></i> Watch Later</a>
        <a href="#" class="list-link" data-list="continue"><i class="fas fa-play-circle"></i> Continue Watching</a>
      </div>
      <div class="studios">
        <h4><i class="fas fa-building"></i> Studios</h4>
        <a href="#" data-studio="Netflix"><i class="fab fa-netflix"></i> Netflix</a>
        <a href="#" data-studio="Prime"><i class="fab fa-amazon"></i> Prime Amazon</a>
        <a href="#" data-studio="Disney"><i class="fab fa-disney"></i> Disney+</a>
        <a href="#" data-studio="HBO"><i class="fas fa-tv"></i> HBO Max</a>
        <a href="#" data-studio="Apple"><i class="fab fa-apple"></i> Apple TV+</a>
      </div>
      <div class="genres">
        <h4><i class="fas fa-tags"></i> Genres (30+)</h4>
        <div class="genres-grid" id="genres-list"></div>
      </div>
      <div class="sidebar-footer">
        <p>© 2025 ALBFILMS24</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="header">
        <button id="menu-toggle" class="menu-icon"><i class="fas fa-bars"></i></button>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="Search 5000+ movies, 2000+ series...">
        </div>
      </div>

      <!-- Top Slider (6 most clicked, changes every 24h) -->
      <section class="slider-section">
        <h2><i class="fas fa-chart-line"></i> Trending Now 🔥</h2>
        <div class="slider-container">
          <button class="slider-prev"><i class="fas fa-chevron-left"></i></button>
          <div class="slider-track" id="slider-track"></div>
          <button class="slider-next"><i class="fas fa-chevron-right"></i></button>
        </div>
      </section>

      <!-- Dynamic Content Grid -->
      <section class="content-section">
        <div class="section-header">
          <h2 id="section-title">Recommended Movies</h2>
          <div class="filter-buttons">
            <button class="filter-btn active" data-type="movie">Movies</button>
            <button class="filter-btn" data-type="tv">TV Series</button>
          </div>
        </div>
        <div class="movies-grid" id="movies-grid">
          <!-- Cards loaded via JS -->
        </div>
        <div class="loader" id="loader" style="display:none;"><div class="spinner"></div></div>
        <button id="load-more" class="load-more">Load More</button>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
  <script>
    // Page-specific init
    window.currentPage = 'index';
    window.contentType = 'movie';
    initIndexPage();
  </script>
</body>
</html>
