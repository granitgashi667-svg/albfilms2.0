<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBFILMS24 - Watch Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.75);
            z-index:-1;
        }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .back-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; margin-bottom:20px; display:inline-flex; align-items:center; gap:8px; }
        .movie-hero { display:flex; gap:30px; background:rgba(20,20,30,0.7); backdrop-filter:blur(12px); border-radius:28px; padding:25px; margin-bottom:30px; flex-wrap:wrap; }
        .poster img { width:220px; border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,0.5); }
        .title { font-size:36px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:12px; }
        .detail-badge { background:#1e2026; padding:5px 12px; border-radius:30px; font-size:0.85rem; display:inline-block; margin-right:10px; margin-top:8px; }
        .servers { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; }
        .server-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:#ccc; cursor:pointer; transition:0.2s; }
        .server-btn.active, .server-btn:hover { background:#e50914; color:white; }
        .player-wrapper { border-radius:24px; overflow:hidden; background:#000; }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
        @media (max-width:700px){ .poster img{ width:140px; } .title{ font-size:24px; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="info" class="movie-hero"></div>
    <div class="servers" id="serverList"></div>
    <div class="player-wrapper">
        <iframe id="player" allowfullscreen></iframe>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(location.search);
    const id = urlParams.get('id');
    const type = urlParams.get('type') || 'movie';
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';
    let currentServer = 'vidsrc';
    
    const servers = {
        vidsrc: { name: 'Server 1', getUrl: () => `https://vidsrcme.ru/embed/movie/${id}` },
        multiembed: { name: 'Server 2 (AirPlay)', getUrl: () => `https://multiembed.mov/?video_id=${id}&tmdb=1` },
        embed2: { name: 'Server 3', getUrl: () => `https://www.2embed.cc/embed/${id}` },
        superembed: { name: 'Server 4', getUrl: () => `https://superembed.stream/movie/${id}` },
        vidcloud: { name: 'Server 5', getUrl: () => `https://vidcloud9.com/embed/${id}` },
        streamtape: { name: 'Server 6', getUrl: () => `https://streamtape.com/e/${id}` }
    };
    
    async function loadDetails() {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=credits`);
        const data = await res.json();
        if (data.backdrop_path) document.body.style.backgroundImage = `url('${BACKDROP + data.backdrop_path}')`;
        else if (data.poster_path) document.body.style.backgroundImage = `url('${IMG + data.poster_path}')`;
        
        const year = (data.release_date || data.first_air_date || '').split('-')[0] || 'N/A';
        const runtime = data.runtime ? `${Math.floor(data.runtime/60)}h ${data.runtime%60}m` : (data.number_of_episodes ? `${data.number_of_episodes} eps` : 'N/A');
        const cast = data.credits?.cast?.slice(0,5).map(c=>c.name).join(', ') || 'N/A';
        const studio = data.production_companies?.[0]?.name || 'Unknown';
        
        document.getElementById('info').innerHTML = `
            <div class="poster"><img src="${data.poster_path ? IMG+data.poster_path : ''}"></div>
            <div style="flex:1">
                <div class="title">${data.title || data.name}</div>
                <div>
                    <span class="detail-badge"><i class="fas fa-calendar"></i> ${year}</span>
                    <span class="detail-badge"><i class="fas fa-star"></i> ${data.vote_average?.toFixed(1)}/10</span>
                    <span class="detail-badge"><i class="fas fa-clock"></i> ${runtime}</span>
                    <span class="detail-badge"><i class="fas fa-building"></i> ${studio}</span>
                </div>
                <div class="cast" style="margin:12px 0;"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div>
                <p style="line-height:1.5;">${data.overview || 'No description available.'}</p>
            </div>
        `;
        
        const container = document.getElementById('serverList');
        container.innerHTML = '';
        Object.keys(servers).forEach(key => {
            const btn = document.createElement('button');
            btn.textContent = servers[key].name;
            btn.className = `server-btn ${key === currentServer ? 'active' : ''}`;
            btn.onclick = () => {
                currentServer = key;
                document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                loadVideo();
            };
            container.appendChild(btn);
        });
        loadVideo();
    }
    
    function loadVideo() {
        document.getElementById('player').src = servers[currentServer].getUrl();
    }
    
    loadDetails();
</script>
</body>
</html>
