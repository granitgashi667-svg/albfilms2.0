<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBFILMS24 - Watch Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #0a0a0f; color:#fff; font-family:'Inter',sans-serif; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .back-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; margin-bottom:20px; }
        .movie-hero { display:flex; gap:30px; background:rgba(20,20,30,0.7); border-radius:28px; padding:25px; margin-bottom:30px; }
        .poster img { width:200px; border-radius:16px; }
        .title { font-size:32px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .servers { display:flex; gap:12px; margin:20px 0; flex-wrap:wrap; }
        .server-btn { background:#1e2026; border:none; padding:10px 24px; border-radius:40px; color:#ccc; cursor:pointer; }
        .server-btn.active, .server-btn:hover { background:#e50914; color:white; }
        .player-wrapper { border-radius:24px; overflow:hidden; background:#000; }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
        @media (max-width:700px){ .poster img{ width:120px; } .title{ font-size:24px; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="info" class="movie-hero"></div>
    <div class="servers" id="serverList"></div>
    <div class="player-wrapper">
        <iframe id="player" allowfullscreen></iframe>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(location.search);
    const id = urlParams.get('id');
    const type = urlParams.get('type') || 'movie';
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let currentServer = 'vidsrc';
    const servers = {
        vidsrc: { name: 'Server 1', getUrl: () => `https://vidsrcme.ru/embed/movie/${id}` },
        multiembed: { name: 'Server 2 (AirPlay)', getUrl: () => `https://multiembed.mov/?video_id=${id}&tmdb=1` },
        embed2: { name: 'Server 3', getUrl: () => `https://www.2embed.cc/embed/${id}` }
    };
    async function loadDetails() {
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);
        const data = await res.json();
        document.getElementById('info').innerHTML = `
            <div class="poster"><img src="${IMG+data.poster_path}"></div>
            <div><div class="title">${data.title || data.name}</div><p>${data.overview}</p><p>⭐ ${data.vote_average}</p></div>
        `;
        const container = document.getElementById('serverList');
        Object.keys(servers).forEach(key => {
            const btn = document.createElement('button');
            btn.textContent = servers[key].name;
            btn.className = `server-btn ${key === currentServer ? 'active' : ''}`;
            btn.onclick = () => { currentServer = key; document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadVideo(); };
            container.appendChild(btn);
        });
        loadVideo();
    }
    function loadVideo() { document.getElementById('player').src = servers[currentServer].getUrl(); }
    loadDetails();
</script>
</body>
</html>
